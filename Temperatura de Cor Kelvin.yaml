blueprint:
  name: Igualar Temperatura de Cor Kelvin Externa
  description: Quando uma luz for ligada ou a elevação do sol mudar, iguala a temperatura de cor externa. Será aplicada a qualquer lâmpada que suporte temperatura de cor. É acionado sempre que uma lâmpada é ligada, quando a elevação do sol muda e a cada 5 minutos.
  domain: automation
  input:
    target_lights:
      name: Luzes
      description: As luzes principais a serem controladas
      selector:
        entity:
          domain: light
          multiple: true
    min_color_temp:
      name: Temperatura de Cor Mais Fria
      description: A cor mais azul que suas lâmpadas serão configuradas
      default: 4000
      selector:
        color_temp:
          min: 1500
          max: 7000
          unit: kelvin
    max_color_temp:
      name: Temperatura de Cor Mais Quente
      description: A cor mais amarela que suas lâmpadas serão configuradas
      default: 2202
      selector:
        color_temp:
          min: 1500
          max: 7000
          unit: kelvin
    brightness_action:
      name: Brilho
      description: Quando um dispositivo for ligado, sua temperatura de cor será definida. Isso pode interferir no brilho, portanto esta ação será executada meio segundo depois para definir o brilho da luz.
      selector:
        action: {}
      default:
      - service: light.turn_on
        data:
          brightness: '{{max(trigger.to_state.attributes.brightness,2)}}'
        target:
          entity_id: '{{trigger.entity_id}}'
        alias: Padrão - Definir a luz para seu brilho original, não use brilho 1, pois isso causa problemas em algumas lâmpadas
  source_url: https://gist.github.com/HarvsG/cc86381dc99169159d6d4cd870c36e46
variables:
  target_lights: !input target_lights
  target_on_lights: '{{states.light | selectattr(''state'',''eq'',''on'') | selectattr(''attributes.supported_color_modes'',''match'',".*color_temp.*")
    | map(attribute=''entity_id'') | select("in",target_lights) | list }}'
  min_color_temp: !input min_color_temp
  max_color_temp: !input max_color_temp
  color_temp: '{{ [([(((4791.67 - 3290.66/(1 + 0.222 * ([([0,state_attr(''sun.sun'',
    ''elevation'')]|max),90]|min**0.81))))|int),max_color_temp]|max),min_color_temp]|min}}'
trigger:
- platform: state
  entity_id: !input target_lights
  to: 'on'
  id: single_light_on
- platform: state
  entity_id:
  - sun.sun
  attribute: elevation
  id: elevation_change
- platform: time_pattern
  minutes: '5'
  id: every_5_min
condition:
- condition: template
  value_template: '{{ (states.light | selectattr(''state'',''eq'',''on'') | map(attribute=''entity_id'')
    | list)!= [] }}'
action:
- choose:
  - conditions:
    - condition: trigger
      id: single_light_on
    sequence:
    - service: light.turn_on
      data:
        color_temp_kelvin: '{{color_temp}}'
      target:
        entity_id: '{{trigger.entity_id}}'
    - delay:
        milliseconds: 500
    - choose:
      default: !input brightness_action
  - conditions:
    - condition: or
      conditions:
      - condition: trigger
        id: every_5_min
      - condition: trigger
        id: elevation_change
    sequence:
    - service: light.turn_on
      data:
        color_temp_kelvin: '{{color_temp}}'
        transition: 5
      target:
        entity_id: '{{target_on_lights}}'
mode: parallel